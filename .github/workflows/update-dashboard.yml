name: Update EMT Dashboard

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual triggering

permissions:
  contents: write  # Explicitly grant write permissions
  pages: write     # Allow this workflow to request a GitHub Pages rebuild

concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Update dashboard data
      env:
        CSV_URL: ${{ vars.CSV_URL || secrets.CSV_URL || '' }}
        DATE_URL: ${{ vars.DATE_URL || secrets.DATE_URL || '' }}
        NON_COMPLIANT_URL: ${{ vars.NON_COMPLIANT_URL || secrets.NON_COMPLIANT_URL || '' }}
        CASPS_URL: ${{ vars.CASPS_URL || secrets.CASPS_URL || '' }}
      run: |
        echo "🔄 Starting dashboard update..."
        node update-data.js

    - name: Validate dashboard data
      run: npm run validate:data

    - name: Check for changes
      id: verify-changed-files
      run: |
        git diff --quiet . || echo "changed=true" >> $GITHUB_OUTPUT
        if [ -n "$(git status --porcelain)" ]; then
          echo "📝 Changes detected in working directory"
          git status --porcelain
        else
          echo "✅ No changes detected"
        fi

    - name: Commit and push changes
      if: steps.verify-changed-files.outputs.changed == 'true'
      run: |
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action Bot"
        git add index.html casp-tracker.html emt-tracker.html non-compliant-casps.html data/ feed.xml sitemap.xml
        git status
        git commit -m "🤖 Auto-update dashboard data - $(date '+%Y-%m-%d %H:%M:%S UTC')" || {
          echo "No changes to commit"
          exit 0
        }
        # Push to whatever branch this run is on (scheduled runs are on main;
        # manual test runs on another branch must not try to push to main).
        BRANCH="${GITHUB_REF_NAME}"
        echo "📌 Pushing auto-update to branch: ${BRANCH}"
        for delay in 2 4 8 16; do
          if git push origin "HEAD:${BRANCH}"; then
            echo "🚀 Changes pushed successfully"
            exit 0
          fi
          echo "⚠️ Push failed, rebasing onto latest ${BRANCH} and retrying in ${delay}s..."
          sleep "$delay"
          git pull --rebase origin "${BRANCH}"
        done
        git push origin "HEAD:${BRANCH}" || {
          echo "❌ Failed to push changes after retries"
          exit 1
        }
        echo "🚀 Changes pushed successfully"

    - name: Trigger GitHub Pages build
      if: steps.verify-changed-files.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        echo "🚀 Requesting GitHub Pages build..."
        gh api \
          --method POST \
          "repos/${{ github.repository }}/pages/builds"
        echo "✅ GitHub Pages build requested"

    - name: Summary
      run: |
        echo "✅ Dashboard update workflow completed"
        if [ "${{ steps.verify-changed-files.outputs.changed }}" == "true" ]; then
          echo "📊 Dashboard was updated with new data"
        else
          echo "📊 Dashboard was already up to date"
        fi
