name: CI

on:
  pull_request:
  push:
    branches: [dev]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Syntax-check scripts
      run: |
        node --check update-data.js
        node --check config.js
        node --check scripts/validate-dashboard-data.js
        node --check assets/js/mobile-menu.js
        node --check assets/js/register-view.js

    - name: Check sitemap lists the intent pages
      run: |
        for page in casp-tracker.html emt-tracker.html non-compliant-casps.html; do
          grep -q "$page" sitemap.xml || { echo "sitemap missing $page"; exit 1; }
          test -f "$page" || { echo "missing page $page"; exit 1; }
        done

    - name: Check intent pages carry a static register snapshot
      # The updater bakes a crawlable <table> between these markers so the
      # pages have real content for search engines (not just a JS-loaded table).
      run: |
        for page in casp-tracker.html emt-tracker.html non-compliant-casps.html; do
          grep -q '<!-- register-snapshot:start -->' "$page" || { echo "$page missing snapshot start marker"; exit 1; }
          grep -q '<!-- register-snapshot:end -->' "$page" || { echo "$page missing snapshot end marker"; exit 1; }
          node -e "
            const fs = require('fs');
            const h = fs.readFileSync('$page','utf8');
            const s = h.indexOf('<!-- register-snapshot:start -->');
            const e = h.indexOf('<!-- register-snapshot:end -->');
            const snap = h.slice(s, e);
            if (!/<table/.test(snap)) throw new Error('$page snapshot has no table');
            if (snap.split('<tr').length < 5) throw new Error('$page snapshot has too few rows');
          "
        done
        # Non-compliant snapshot must never contain links (websites are plain text)
        node -e "
          const fs = require('fs');
          const h = fs.readFileSync('non-compliant-casps.html','utf8');
          const s = h.indexOf('<!-- register-snapshot:start -->');
          const e = h.indexOf('<!-- register-snapshot:end -->');
          if (/<a\b/.test(h.slice(s, e))) throw new Error('non-compliant snapshot must not contain links');
          console.log('snapshots OK');
        "

    - name: Check updater markers and data files
      # update-data.js patches the footer "Data as of" lines in index.html;
      # the page itself loads register data from data/*.json at runtime
      run: |
        grep -q 'ESMA EMT Register</a> - Data as of ' index.html
        grep -q 'ESMA CASPs Register</a> - Data as of ' index.html
        node -e "
          const fs = require('fs');
          for (const f of ['data/emts.json', 'data/casps.json', 'data/non-compliant.json']) {
            const parsed = JSON.parse(fs.readFileSync(f, 'utf8'));
            if (!Array.isArray(parsed)) throw new Error(f + ' is not an array');
          }
          console.log('data files OK');
        "

    - name: Validate dashboard data
      run: npm run validate:data
